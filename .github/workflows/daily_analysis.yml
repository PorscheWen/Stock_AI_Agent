name: Daily Stock Analysis

on:
  schedule:
    # 每週一至週五 05:50 UTC（= 台灣時間 13:50，台股收盤後）
    - cron: '50 5 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock analysis and LINE push
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:              ${{ secrets.LINE_USER_ID }}
          LINE_USER_IDS:             ${{ secrets.LINE_USER_IDS }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🔑 檢查 LINE Secrets..."
          if [ -z "$LINE_CHANNEL_ACCESS_TOKEN" ]; then
            echo "::error::LINE_CHANNEL_ACCESS_TOKEN 未設定！請至 Settings > Secrets and variables > Actions 新增"
            exit 1
          fi
          if [ -z "$LINE_USER_ID" ] && [ -z "$LINE_USER_IDS" ]; then
            echo "::error::LINE_USER_ID（或 LINE_USER_IDS）未設定！請至 Settings > Secrets and variables > Actions 新增"
            exit 1
          fi
          echo "✅ Secrets 驗證通過，開始分析..."
          python surge_analyzer.py

      - name: Remove old reports (keep latest 10)
        run: |
          cd daily_run
          ls -t surge_report_*.md 2>/dev/null | tail -n +11 | xargs -r rm -v

      - name: Commit report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_run/
          git diff --staged --quiet || git commit -m "data: 自動更新股票分析報告 $(date +'%Y-%m-%d')"
          git push

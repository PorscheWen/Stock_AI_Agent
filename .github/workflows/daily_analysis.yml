name: Daily Stock Analysis

on:
  schedule:
    # 每週一至週五 06:30 UTC（= 台灣時間 14:30，台股收盤後）
    - cron: '30 6 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock analysis
        run: python surge_analyzer.py

      - name: Remove old reports (keep latest 10)
        run: |
          cd daily_run
          ls -t surge_report_*.md 2>/dev/null | tail -n +11 | xargs -r rm -v

      - name: Commit report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_run/
          git diff --staged --quiet || git commit -m "data: 自動更新股票分析報告 $(date +'%Y-%m-%d')"
          git push

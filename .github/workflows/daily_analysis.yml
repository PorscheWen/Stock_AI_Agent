name: Daily Stock Analysis

on:
  schedule:
    # 每週一至週五 05:50 UTC（= 台灣時間 13:50，台股收盤後）
    - cron: '50 5 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test LINE connection
        env:
          CHANNEL_STOCK_ACCESS_TOKEN: ${{ secrets.CHANNEL_STOCK_ACCESS_TOKEN }}
          CHANNEL_STOCK_USER_ID:      ${{ secrets.CHANNEL_STOCK_USER_ID }}
          CHANNEL_STOCK_SECRET:       ${{ secrets.CHANNEL_STOCK_SECRET }}
        run: |
          python - <<'EOF'
          import os, sys
          from linebot.v3.messaging import (
              MessagingApi, ApiClient, Configuration,
              PushMessageRequest, TextMessage
          )
          token = os.environ.get("CHANNEL_STOCK_ACCESS_TOKEN", "")
          uid   = os.environ.get("CHANNEL_STOCK_USER_ID", "")
          if not token:
              print("::error::CHANNEL_STOCK_ACCESS_TOKEN 為空")
              sys.exit(1)
          if not uid:
              print("::error::CHANNEL_STOCK_USER_ID 為空")
              sys.exit(1)
          print(f"TOKEN prefix: {token[:8]}...  UID: {uid[:6]}...")
          try:
              api = MessagingApi(ApiClient(Configuration(access_token=token)))
              api.push_message(PushMessageRequest(
                  to=uid,
                  messages=[TextMessage(text="🔔 Stock_AI_Agent 自動分析即將開始，請稍候...")]
              ))
              print("✅ LINE 測試推播成功")
          except Exception as e:
              print(f"::error::LINE 推播失敗：{e}")
              sys.exit(1)
          EOF

      - name: Run stock analysis and LINE push
        env:
          CHANNEL_STOCK_ACCESS_TOKEN: ${{ secrets.CHANNEL_STOCK_ACCESS_TOKEN }}
          CHANNEL_STOCK_SECRET:       ${{ secrets.CHANNEL_STOCK_SECRET }}
          CHANNEL_STOCK_USER_ID:      ${{ secrets.CHANNEL_STOCK_USER_ID }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🔑 檢查 LINE Secrets..."
          if [ -z "$CHANNEL_STOCK_ACCESS_TOKEN" ]; then
            echo "::error::CHANNEL_STOCK_ACCESS_TOKEN 未設定！請至 Settings > Secrets and variables > Actions 新增"
            exit 1
          fi
          if [ -z "$CHANNEL_STOCK_USER_ID" ]; then
            echo "::error::CHANNEL_STOCK_USER_ID 未設定！請至 Settings > Secrets and variables > Actions 新增"
            exit 1
          fi
          echo "✅ Secrets 驗證通過，開始分析..."
          python surge_analyzer.py

      - name: Remove old reports (keep latest 10)
        run: |
          cd daily_run
          ls -t surge_report_*.md 2>/dev/null | tail -n +11 | xargs -r rm -v

      - name: Commit report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_run/
          git diff --staged --quiet || git commit -m "data: 自動更新股票分析報告 $(date +'%Y-%m-%d')"
          git push

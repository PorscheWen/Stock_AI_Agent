name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image via Cloud Build
        run: |
          gcloud builds submit . \
            --tag=asia-east1-docker.pkg.dev/stock-ai-agent-prod/stock-ai/stock-ai-agent:latest \
            --project=stock-ai-agent-prod

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update stock-ai-agent \
            --image=asia-east1-docker.pkg.dev/stock-ai-agent-prod/stock-ai/stock-ai-agent:latest \
            --region=asia-east1 \
            --project=stock-ai-agent-prod
